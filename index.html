<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="shortcut icon" href="favicon.png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Montserrat', sans-serif !important; -webkit-tap-highlight-color: transparent; }
    body { background-color: #09090b; color: #f4f4f5; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #39FF14; border-radius: 10px; }
    .neon-text { color: #39FF14; text-shadow: 0 0 12px rgba(57, 255, 20, 0.4); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .bottom-sheet { border-radius: 32px 32px 0 0; }
  </style>
  <title>Kane Store</title>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SafeImage = ({ src, className, onClick }) => {
      const [error, setError] = useState(false);
      return (
        <div className={`${className} bg-zinc-950 flex items-center justify-center overflow-hidden`} onClick={onClick}>
          {error ? (
            <span className="iconify text-zinc-800 text-3xl" data-icon="ph:image-break-bold"></span>
          ) : (
            <img src={src} className="w-full h-full object-cover transition-transform duration-500 active:scale-95" onError={() => setError(true)} alt="" />
          )}
        </div>
      );
    };

    const App = () => {
      const [db, setDb] = useState({ store: {}, products: [], categories: [] });
      const [cart, setCart] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [activeCat, setActiveCat] = useState(null);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [userInfo, setUserInfo] = useState({ name: '', dni: '', phone: '', city: '', agency: 'Shalom' });

      // Carga dinámica desde el archivo JSON
      useEffect(() => {
        fetch('data.json')
          .then(res => res.json())
          .then(data => setDb(data))
          .catch(err => console.error("Error al leer data.json", err));
      }, []);

      const products = useMemo(() => {
        return db.products.filter(p => {
          const matchSearch = p.title.toLowerCase().includes(searchTerm.toLowerCase()) || p.id.toLowerCase().includes(searchTerm.toLowerCase());
          const matchCat = activeCat ? p.catId === activeCat : true;
          return matchSearch && matchCat;
        });
      }, [db.products, searchTerm, activeCat]);

      const addToCart = (product) => {
        const item = cart.find(i => i.id === product.id);
        if (item) {
          setCart(cart.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i));
        } else {
          setCart([...cart, { ...product, qty: 1 }]);
        }
      };

      const sendWhatsApp = () => {
        if (!userInfo.name || !userInfo.dni || !userInfo.city) return alert("Faltan datos para el envío.");
        let msg = `*PEDIDO NUEVO - ${db.store.name}*\n\n`;
        msg += `👤 *Cliente:* ${userInfo.name}\n🆔 *DNI:* ${userInfo.dni}\n📍 *Lugar:* ${userInfo.city}\n🚚 *Agencia:* ${userInfo.agency}\n\n`;
        msg += `*PRODUCTOS:*\n`;
        cart.forEach(i => msg += `• ${i.qty}x ${i.title} (#${i.id}) - S/ ${i.price * i.qty}\n`);
        msg += `\n*TOTAL: S/ ${cart.reduce((a, b) => a + (b.price * b.qty), 0).toFixed(2)}*\n_Envío Gratis Incluido_`;
        window.open(`https://wa.me/${db.store.phoneRaw}?text=${encodeURIComponent(msg)}`, '_blank');
      };

      const RelatedProducts = ({ current }) => {
        const related = useMemo(() => {
          return db.products
            .filter(p => p.id !== current.id && (p.catId === current.catId || p.subCatId === current.subCatId))
            .sort((a, b) => (a.subCatId === current.subCatId && b.subCatId !== current.subCatId ? -1 : 0))
            .slice(0, 4);
        }, [current]);

        if (related.length === 0) return null;

        return (
          <div className="mt-8 border-t border-zinc-800 pt-8">
            <h4 className="text-[10px] font-black text-[#39FF14] uppercase tracking-[0.2em] mb-4">Recomendados para ti</h4>
            <div className="grid grid-cols-2 gap-3">
              {related.map(p => (
                <div key={p.id} onClick={() => {setSelectedProduct(p); window.scrollTo(0,0);}} className="bg-zinc-950 p-2 rounded-2xl border border-zinc-900 active:scale-95 transition-transform">
                  <SafeImage src={p.images[0]} className="aspect-square rounded-xl mb-2" />
                  <p className="text-[9px] font-bold uppercase truncate text-zinc-300">{p.title}</p>
                  <p className="text-[#39FF14] font-black text-[10px]">S/ {p.price}</p>
                </div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="sticky top-0 z-40 bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-900 px-4 py-3 md:px-8">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div onClick={() => {setActiveCat(null); setSearchTerm('');}} className="cursor-pointer">
                <h1 className="text-lg md:text-xl font-black italic neon-text uppercase tracking-tighter leading-none">{db.store.name}</h1>
                <p className="text-[8px] md:text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">{db.store.slogan}</p>
              </div>
              <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-zinc-900 rounded-xl border border-zinc-800 active:border-[#39FF14] transition-all">
                <span className="iconify text-xl" data-icon="ph:shopping-cart-simple-fill"></span>
                {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-[#39FF14] text-black text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-lg shadow-[#39FF14]/20">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto w-full p-4 md:p-8 flex-grow">
            {/* Buscador */}
            <div className="mb-6">
              <div className="relative">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"><span className="iconify text-lg" data-icon="ph:magnifying-glass-bold"></span></span>
                <input 
                  type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                  placeholder="Busca por nombre o código..." 
                  className="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl py-3.5 pl-12 pr-4 focus:border-[#39FF14] transition-all text-sm font-bold placeholder:text-zinc-600"
                />
              </div>
            </div>

            {/* Categorías Dinámicas */}
            <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar -mx-4 px-4 md:mx-0 md:px-0">
              <button onClick={() => setActiveCat(null)} className={`px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all whitespace-nowrap ${!activeCat ? 'bg-[#39FF14] text-black' : 'bg-zinc-900 text-zinc-500 border border-zinc-800'}`}>TODO</button>
              {db.categories.map(c => (
                <button key={c.id} onClick={() => setActiveCat(c.id)} className={`px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all whitespace-nowrap ${activeCat === c.id ? 'bg-[#39FF14] text-black' : 'bg-zinc-900 text-zinc-500 border border-zinc-800'}`}>
                  {c.name.toUpperCase()}
                </button>
              ))}
            </div>

            {/* Grid de Productos Responsive */}
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6 mt-4">
              {products.map(p => (
                <div key={p.id} className="bg-zinc-900/40 border border-zinc-800 rounded-[28px] overflow-hidden flex flex-col hover:border-zinc-700 transition-all active:scale-[0.98]">
                  <div onClick={() => setSelectedProduct(p)} className="aspect-square relative cursor-pointer">
                    <SafeImage src={p.images[0]} className="w-full h-full" />
                    <div className="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-2 py-0.5 rounded-md text-[8px] font-black text-[#39FF14]">#{p.id}</div>
                  </div>
                  <div className="p-3 md:p-5 flex-grow flex flex-col justify-between">
                    <div className="mb-3">
                      <h3 className="text-[10px] md:text-[11px] font-black uppercase text-zinc-100 line-clamp-1 mb-1">{p.title}</h3>
                      <p className="text-[11px] md:text-sm font-black text-[#39FF14]">S/ {p.price.toFixed(2)}</p>
                    </div>
                    <button onClick={() => addToCart(p)} className="w-full bg-zinc-100 hover:bg-[#39FF14] text-black font-black py-2.5 md:py-3 rounded-xl text-[9px] uppercase transition-all">Añadir</button>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* Modal Producto Full Screen en Móvil */}
          {selectedProduct && (
            <div className="fixed inset-0 z-50 flex flex-col bg-zinc-950 overflow-y-auto">
              <div className="relative w-full max-w-4xl mx-auto bg-zinc-900 md:my-10 md:rounded-[40px] md:overflow-hidden md:border md:border-zinc-800">
                <button onClick={() => setSelectedProduct(null)} className="fixed top-4 right-4 z-50 p-2 bg-black/50 backdrop-blur-xl rounded-full text-white md:absolute md:top-6 md:right-6">
                  <span className="iconify text-3xl" data-icon="ph:x-bold"></span>
                </button>
                
                <div className="flex flex-col md:flex-row">
                  {/* Galería */}
                  <div className="w-full md:w-1/2 p-4 md:p-8">
                    <div className="aspect-square rounded-3xl overflow-hidden bg-zinc-950 border border-zinc-800 mb-4">
                      <SafeImage src={selectedProduct.mainImg || selectedProduct.images[0]} className="w-full h-full" />
                    </div>
                    <div className="flex gap-2 overflow-x-auto hide-scrollbar">
                      {selectedProduct.images.map(img => (
                        <div key={img} onClick={() => setSelectedProduct({...selectedProduct, mainImg: img})} className={`w-16 h-16 md:w-20 md:h-20 rounded-xl overflow-hidden shrink-0 border-2 cursor-pointer transition-all ${ (selectedProduct.mainImg || selectedProduct.images[0]) === img ? 'border-[#39FF14]' : 'border-transparent'}`}>
                          <SafeImage src={img} className="w-full h-full" />
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Info */}
                  <div className="p-6 md:p-10 flex flex-col md:w-1/2 border-t md:border-t-0 md:border-l border-zinc-800/50">
                    <span className="text-[9px] font-black text-[#39FF14] tracking-[0.2em] uppercase mb-2">ID: {selectedProduct.id}</span>
                    <h2 className="text-2xl md:text-3xl font-black uppercase text-white mb-2 italic leading-tight">{selectedProduct.title}</h2>
                    <div className="text-3xl font-black text-[#39FF14] mb-6">S/ {selectedProduct.price.toFixed(2)}</div>
                    
                    <div className="space-y-4 mb-8">
                      <p className="text-zinc-400 text-sm leading-relaxed whitespace-pre-wrap">{selectedProduct.description}</p>
                    </div>

                    <div className="sticky bottom-4 md:relative space-y-4">
                      <div className="p-3 bg-[#39FF14]/10 rounded-xl border border-[#39FF14]/20 text-[9px] font-bold text-[#39FF14] flex items-center gap-3">
                        <span className="iconify text-xl" data-icon="ph:truck-bold"></span> ENVÍO GRATIS (SHALOM / MARVISUR / OLVA)
                      </div>
                      <button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); setIsCartOpen(true); }} className="w-full bg-[#39FF14] text-black font-black py-4 rounded-2xl text-[10px] uppercase shadow-lg shadow-[#39FF14]/10">Comprar Ahora</button>
                    </div>

                    <RelatedProducts current={selectedProduct} />
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Carrito Full Screen en Móvil */}
          {isCartOpen && (
            <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex justify-end">
              <div className="w-full max-w-md bg-zinc-900 h-full flex flex-col shadow-2xl overflow-hidden border-l border-zinc-800">
                <div className="p-6 border-b border-zinc-800 flex justify-between items-center">
                  <h2 className="text-lg font-black italic uppercase">Tu Carrito</h2>
                  <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 active:text-white"><span className="iconify text-3xl" data-icon="ph:x-circle-fill"></span></button>
                </div>

                <div className="flex-grow overflow-y-auto p-5 custom-scrollbar pb-10">
                  {cart.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-zinc-600 font-bold italic text-[10px] uppercase">Tu bolsa está vacía...</div>
                  ) : (
                    <div className="space-y-8">
                      {cart.map(item => (
                        <div key={item.id} className="flex gap-3 items-center">
                          <div className="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-zinc-800"><SafeImage src={item.images[0]} className="w-full h-full" /></div>
                          <div className="flex-grow">
                            <h4 className="text-[10px] font-black uppercase text-zinc-300 leading-tight mb-1">{item.title}</h4>
                            <div className="flex justify-between items-center">
                              <p className="text-[#39FF14] font-black text-xs">S/ {item.price}</p>
                              <div className="flex items-center gap-3 bg-zinc-950 px-2 py-1 rounded-lg border border-zinc-800">
                                <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: Math.max(1, i.qty-1)} : i))} className="p-1 text-zinc-600">-</button>
                                <span className="text-[10px] font-black w-4 text-center">{item.qty}</span>
                                <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty+1} : i))} className="p-1 text-[#39FF14]">+</button>
                              </div>
                            </div>
                          </div>
                          <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-red-900/50 p-2"><span className="iconify text-lg" data-icon="ph:trash-bold"></span></button>
                        </div>
                      ))}

                      <div className="pt-6 border-t border-zinc-800 space-y-4">
                        <h3 className="text-[10px] font-black text-[#39FF14] uppercase tracking-widest">Información de Envío</h3>
                        <input placeholder="Nombre Completo" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3.5 text-xs font-bold focus:border-[#39FF14]" value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} />
                        <div className="grid grid-cols-2 gap-2">
                          <input placeholder="DNI" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3.5 text-xs font-bold focus:border-[#39FF14]" value={userInfo.dni} onChange={e => setUserInfo({...userInfo, dni: e.target.value})} />
                          <input placeholder="WhatsApp" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3.5 text-xs font-bold focus:border-[#39FF14]" value={userInfo.phone} onChange={e => setUserInfo({...userInfo, phone: e.target.value})} />
                        </div>
                        <input placeholder="Ciudad (Destino)" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3.5 text-xs font-bold focus:border-[#39FF14]" value={userInfo.city} onChange={e => setUserInfo({...userInfo, city: e.target.value})} />
                        <div className="grid grid-cols-3 gap-2 mt-2">
                          {['Shalom', 'Marvisur', 'Olva'].map(ag => (
                            <button key={ag} onClick={() => setUserInfo({...userInfo, agency: ag})} className={`py-3 rounded-xl text-[9px] font-black border transition-all ${userInfo.agency === ag ? 'bg-[#39FF14] border-[#39FF14] text-black' : 'bg-zinc-950 border-zinc-800 text-zinc-600'}`}>{ag.toUpperCase()}</button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-6 bg-zinc-950 border-t border-zinc-800 mt-auto">
                  <div className="flex justify-between items-center mb-6">
                    <span className="text-zinc-600 font-black uppercase text-[10px] tracking-widest">Total a pagar</span>
                    <span className="text-2xl font-black text-[#39FF14]">S/ {cart.reduce((a, b) => a + (b.price * b.qty), 0).toFixed(2)}</span>
                  </div>
                  <button 
                    disabled={cart.length === 0}
                    onClick={sendWhatsApp}
                    className="w-full bg-[#39FF14] text-black font-black py-4.5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-20"
                  >
                    <span className="iconify text-xl" data-icon="ph:whatsapp-logo-fill"></span> COMPLETAR PEDIDO
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
